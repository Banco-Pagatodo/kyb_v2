# Alembic Configuration — Dakota/kyb_review
# =========================================
# Ejecutar desde Dakota/kyb_review/:
#   alembic upgrade head
#   alembic revision --autogenerate -m "descripción"

[alembic]
# Directorio de migraciones
script_location = alembic

# Template para nuevas migraciones
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Usar asyncio para migraciones (configurado en env.py)
# La URL de BD se lee desde variables de entorno en env.py
# sqlalchemy.url se define dinámicamente en env.py._get_url()

# Truncar columnas del logger
# output_encoding = utf-8

[post_write_hooks]
# Opción: formatear migraciones con ruff
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
